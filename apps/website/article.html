<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Article - FoundersTribe</title>
    <meta
      name="description"
      content="Open shared FoundersTribe articles in the mobile app."
    />
    <meta property="og:title" content="FoundersTribe Article" />
    <meta
      property="og:description"
      content="Open this article in the FoundersTribe app."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="FoundersTribe" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0b0f19;
        --panel: rgba(16, 23, 38, 0.88);
        --border: rgba(255, 255, 255, 0.12);
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.7);
        --brand: #cf2030;
        --brand-light: #eb4455;
        --shadow: rgba(0, 0, 0, 0.4);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: "Inter", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(207, 32, 48, 0.28), transparent 34%),
          radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.24), transparent 30%),
          var(--bg);
      }

      .card {
        width: min(100%, 520px);
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 20px 70px var(--shadow);
        backdrop-filter: blur(16px);
      }

      .eyebrow {
        display: inline-flex;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(207, 32, 48, 0.18);
        color: #ff9ca5;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 14px 0 12px;
        font-size: clamp(28px, 6vw, 38px);
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.6;
      }

      .preview {
        margin-top: 18px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        overflow: hidden;
      }

      .preview-image {
        width: 100%;
        height: 220px;
        object-fit: cover;
        display: none;
      }

      .preview-title {
        margin: 0;
        padding: 14px 16px;
        font-size: 15px;
        line-height: 1.45;
      }

      .article-id {
        margin: 12px 0 0;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.62);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        padding: 0 18px;
        border-radius: 999px;
        border: 1px solid transparent;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
      }

      .button-primary {
        background: linear-gradient(135deg, var(--brand-light), var(--brand));
        color: #fff;
        box-shadow: 0 12px 30px rgba(207, 32, 48, 0.3);
      }

      .button-secondary {
        border-color: var(--border);
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
      }

      .status {
        margin-top: 16px;
        font-size: 14px;
        color: var(--muted);
      }

      @media (max-width: 520px) {
        .card {
          padding: 20px;
        }

        .preview-image {
          height: 190px;
        }

        .actions {
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">FoundersTribe article</div>
      <h1 id="hero-title">Opening the article in FoundersTribe...</h1>
      <p id="description">
        If FoundersTribe is installed, this article should open automatically.
      </p>

      <div class="preview">
        <img id="preview-image" class="preview-image" alt="Article preview" />
        <h2 id="preview-title" class="preview-title">Loading article details...</h2>
      </div>

      <div class="article-id" id="article-id">Preparing article link...</div>

      <div class="actions">
        <a class="button button-primary" id="open-app" href="appfounderstribe://">
          Open FoundersTribe
        </a>
        <a class="button button-secondary" id="open-source" href="/" target="_blank" rel="noopener noreferrer">
          Open original link
        </a>
      </div>
      <p class="status" id="status">
        If nothing happens, tap "Open FoundersTribe".
      </p>
    </main>

    <script>
      (function () {
        var parts = window.location.pathname.split("/").filter(Boolean);
        var articleId = parts[0] === "article" ? parts[1] : "";
        var query = new URLSearchParams(window.location.search || "");
        var title = (query.get("title") || "").trim();
        var imageUrl = (query.get("imageUrl") || "").trim();
        var articleLink = (query.get("articleLink") || "").trim();
        var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

        var openAppEl = document.getElementById("open-app");
        var openSourceEl = document.getElementById("open-source");
        var heroTitleEl = document.getElementById("hero-title");
        var previewTitleEl = document.getElementById("preview-title");
        var previewImageEl = document.getElementById("preview-image");
        var articleIdEl = document.getElementById("article-id");
        var descriptionEl = document.getElementById("description");
        var statusEl = document.getElementById("status");

        var appQuery = new URLSearchParams();
        if (title) appQuery.set("title", title);
        if (imageUrl) appQuery.set("imageUrl", imageUrl);
        if (articleLink) appQuery.set("articleLink", articleLink);
        var appQueryString = appQuery.toString();

        var appUrl = articleId
          ? "appfounderstribe://article/" + articleId + (appQueryString ? "?" + appQueryString : "")
          : "appfounderstribe://";

        openAppEl.href = appUrl;

        if (articleLink) {
          openSourceEl.href = articleLink;
        } else {
          openSourceEl.style.display = "none";
        }

        if (title) {
          heroTitleEl.textContent = title;
          previewTitleEl.textContent = title;
          document.title = title + " - FoundersTribe";
        } else {
          previewTitleEl.textContent = "Open this shared article in the FoundersTribe app.";
        }

        if (imageUrl) {
          previewImageEl.src = imageUrl;
          previewImageEl.style.display = "block";
        }

        if (articleId) {
          articleIdEl.textContent = "Article ID: " + articleId;
        } else {
          articleIdEl.textContent = "No article id was found in this link.";
          descriptionEl.textContent =
            "This article link looks incomplete. Ask the sender to share it again.";
          statusEl.textContent = "You can still open the app from the button below.";
          return;
        }

        if (!isMobile) {
          statusEl.textContent =
            "This link opens best on a phone with the FoundersTribe app installed.";
          return;
        }

        window.setTimeout(function () {
          window.location.href = appUrl;
        }, 250);
      })();
    </script>
  </body>
</html>
