<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Room - FoundersTribe</title>
    <meta
      name="description"
      content="Open your FoundersTribe voice room in the mobile app."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #0d0d0d;
        --panel: rgba(26, 26, 26, 0.9);
        --border: rgba(255, 255, 255, 0.1);
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.68);
        --brand: #cf2030;
        --brand-light: #e74957;
        --shadow: rgba(0, 0, 0, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: "Inter", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(231, 73, 87, 0.28), transparent 36%),
          radial-gradient(circle at bottom right, rgba(123, 97, 255, 0.18), transparent 28%),
          var(--bg);
      }

      .card {
        width: min(100%, 460px);
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 24px 80px var(--shadow);
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        display: inline-flex;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(207, 32, 48, 0.16);
        color: #ff9ca5;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 10px;
        font-size: clamp(32px, 7vw, 44px);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }

      .room-id {
        margin: 18px 0 0;
        padding: 12px 14px;
        border-radius: 16px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.86);
        font-size: 13px;
        word-break: break-word;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        padding: 0 18px;
        border-radius: 999px;
        border: 1px solid transparent;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
      }

      .button-primary {
        background: linear-gradient(135deg, var(--brand-light), var(--brand));
        color: #fff;
        box-shadow: 0 12px 32px rgba(207, 32, 48, 0.28);
      }

      .button-secondary {
        border-color: var(--border);
        color: var(--text);
        background: rgba(255, 255, 255, 0.04);
      }

      .status {
        margin-top: 18px;
        font-size: 14px;
        color: var(--muted);
      }

      @media (max-width: 520px) {
        .card {
          padding: 24px;
          border-radius: 24px;
        }

        .actions {
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="eyebrow">FoundersTribe room</div>
      <h1>Opening the app...</h1>
      <p id="description">
        If FoundersTribe is installed, this room should open automatically.
      </p>
      <div class="room-id" id="room-id">Preparing room link...</div>
      <div class="actions">
        <a class="button button-primary" id="open-app" href="appfounderstribe://">
          Open FoundersTribe
        </a>
        <a class="button button-secondary" href="/">Go to homepage</a>
      </div>
      <p class="status" id="status">
        If nothing happens, tap "Open FoundersTribe".
      </p>
    </main>

    <script>
      (function () {
        var parts = window.location.pathname.split("/").filter(Boolean);
        var roomId = parts[0] === "room" ? parts[1] : "";
        var appUrl = roomId
          ? "appfounderstribe://room/" + roomId
          : "appfounderstribe://";
        var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

        var roomIdEl = document.getElementById("room-id");
        var openAppEl = document.getElementById("open-app");
        var descriptionEl = document.getElementById("description");
        var statusEl = document.getElementById("status");

        openAppEl.href = appUrl;

        if (roomId) {
          roomIdEl.textContent = "Room ID: " + roomId;
        } else {
          roomIdEl.textContent = "No room id was found in this link.";
          descriptionEl.textContent =
            "This room link looks incomplete. Ask the sender to share it again.";
          statusEl.textContent = "You can still open the app from the button below.";
          return;
        }

        if (!isMobile) {
          statusEl.textContent =
            "This link opens best on a phone with the FoundersTribe app installed.";
          return;
        }

        window.setTimeout(function () {
          window.location.href = appUrl;
        }, 250);
      })();
    </script>
  </body>
</html>
